server:
  port: 8086

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/payment_service?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:binary777Code}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_SERVER:localhost:8761}/eureka
  instance:
    prefer-ip-address: true
    metadata-map:
      "prometheus": "true"

stripe:
  api:
    key: ${STRIPE_API_KEY:sk_test_dummy}
  webhook:
    secret: ${STRIPE_WEBHOOK_SECRET:whsec_dummy}

jwt:
  secret: ${JWT_SECRET:BinaryLabyrinthOnlineShoppingAppSecretKeyForJWTTokenSigningPurpose}
  expiration: ${JWT_EXPIRATION:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.binarylabyrinth: DEBUG
    org.springframework.security: DEBUG
