spring:
  datasource:
    url: jdbc:h2:mem:inventory_service_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  kafka:
    admin:
      auto-create: false
    listener:
      auto-startup: false

eureka:
  client:
    enabled: false
