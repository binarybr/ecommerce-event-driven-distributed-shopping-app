server:
  port: ${SERVER_PORT:8088}

spring:
  application:
    name: review-service
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/review_service?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:binary777Code}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_SERVER:localhost:8761}/eureka
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:BinaryLabyrinthOnlineShoppingAppSecretKeyForJWTTokenSigningPurpose}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.binarylabyrinth: DEBUG
