server:
  port: ${SERVER_PORT:8090}

spring:
  application:
    name: admin-service

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_SERVER:localhost:8761}/eureka
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:BinaryLabyrinthOnlineShoppingAppSecretKeyForJWTTokenSigningPurpose}

# Feign timeouts — admin endpoints fan out 4-5 service calls, so allow
# generous limits so a slow downstream doesn't crash the dashboard request.
feign:
  client:
    config:
      default:
        connect-timeout: 5000
        read-timeout: 10000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.binarylabyrinth: DEBUG
