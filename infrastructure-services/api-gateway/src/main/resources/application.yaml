server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/users/**
            - id: product-service
              uri: lb://product-service
              predicates:
                - Path=/api/products/**
            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/api/orders/**
            - id: inventory-service
              uri: lb://inventory-service
              predicates:
                - Path=/api/inventory/**
            - id: notification-service
              uri: lb://notification-service
              predicates:
                - Path=/api/notifications/**
            - id: payment-service
              uri: lb://payment-service
              predicates:
                - Path=/api/payments/**
            - id: cart-service
              uri: lb://cart-service
              predicates:
                - Path=/api/cart/**
            - id: review-service
              uri: lb://review-service
              predicates:
                - Path=/api/reviews/**
            - id: recommendation-service
              uri: lb://recommendation-service
              predicates:
                - Path=/api/recommendations/**
            - id: admin-service
              uri: lb://admin-service
              predicates:
                - Path=/api/admin/**

eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}

gateway:
  security:
    username: ${GATEWAY_USERNAME:admin}
    password: ${GATEWAY_PASSWORD:admin}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: when-authorized
