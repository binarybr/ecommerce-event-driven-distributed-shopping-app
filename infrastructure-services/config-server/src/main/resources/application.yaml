server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    active: ${CONFIG_SERVER_PROFILE:native}
  cloud:
    config:
      server:
        native:
          search-locations: ${CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS:classpath:/config-repo}
        git:
          uri: ${CONFIG_SERVER_GIT_URI:https://github.com/your-org/config-repo}
          default-label: ${CONFIG_SERVER_GIT_DEFAULT_LABEL:main}
